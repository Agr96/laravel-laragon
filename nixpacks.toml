[phases.setup]
nixPkgs = ["php83", "composer", "nodejs_20"]

[phases.build]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install",
    "npm run build"
]

# Tambahkan bagian ini agar Nixpacks tahu ini aplikasi PHP
[variables]
NIXPACKS_PHP_ROOT = "/app/public"

[start]
cmd = "php-fpm -D && nginx -g 'daemon off;'"

[phases.postbuild]
cmds = [
    "mkdir -p storage/framework/cache storage/framework/sessions storage/framework/views",
    "chmod -R 775 storage bootstrap/cache"
]
